# Docker Compose para API FastAPI + MongoDB (PSN Library)

services:
  mongodb:
    image: mongo
    container_name: psn_mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
     
      - "27018:27017"
    environment:
      - MONGO_INITDB_DATABASE=psn_biblioteca
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - psn_network

  api:
    build: .
    container_name: psn_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
     
      - MONGO_URL=mongodb://mongodb:27017
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - .:/app  
    networks:
      - psn_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mongo_data:
    name: psn_mongo_data

networks:
  psn_network:
    name: psn_network
    driver: bridge